<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notifications - EventSphere Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>
    <style>
        .notif-item{background:#fff;border-radius:12px;padding:1rem 1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:.65rem;border-left:4px solid #6366f1;display:flex;align-items:flex-start;gap:1rem;}
        .notif-icon{width:40px;height:40px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;flex-shrink:0;}
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{admin/adminheader :: header}"></div>
    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-search"><i class="bi bi-search position-absolute ms-3 mt-2"></i><input type="text" placeholder="Search..."></div>
            <div class="navbar-actions">
                <div class="user-profile"><div class="user-avatar">AD</div>
                    <div class="d-none d-md-block"><div class="fw-600">Admin</div><small class="text-muted">Administrator</small></div>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div><h2 class="fw-bold mb-1">Notifications</h2>
                    <p class="text-muted mb-0">Send and manage platform-wide announcements</p></div>
                <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#broadcastModal">
                    <i class="bi bi-megaphone me-2"></i>Broadcast
                </button>
            </div>

            <div class="row g-4">
                <!-- Sent Notifications -->
                <div class="col-lg-8">
                    <div class="table-card p-4">
                        <h5 class="fw-bold mb-3">Broadcast History</h5>
                        <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-4 text-muted">
                            <i class="bi bi-bell-slash fs-2 d-block mb-2"></i>No broadcasts sent yet.
                        </div>
                        <div th:each="n : ${notifications}" class="notif-item">
                            <div class="notif-icon">
                                <i th:class="'bi ' + (n.icon!=null?n.icon:'bi-megaphone')"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <h6 class="fw-bold mb-1" th:text="${n.title}">Title</h6>
                                    <small class="text-muted" th:text="${#temporals.format(n.createdAt,'dd MMM yyyy, HH:mm')}">Time</small>
                                </div>
                                <p class="text-muted small mb-0" th:text="${n.message}">Message</p>
                                <span class="badge bg-secondary mt-1 small"
                                      th:text="${n.user==null?'All Users':'User: '+n.user.fullName}">Target</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Broadcast Form -->
                <div class="col-lg-4">
                    <div class="table-card p-4">
                        <h5 class="fw-bold mb-3">Quick Broadcast</h5>
                        <form th:action="@{/admin/notifications/broadcast}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label class="form-label fw-600">Title</label>
                                <input type="text" name="title" class="form-control" placeholder="Notification title" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-600">Message</label>
                                <textarea name="message" class="form-control" rows="4" placeholder="Type your message..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100">
                                <i class="bi bi-send me-2"></i>Send to All Users
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Broadcast Modal (optional larger form) -->
<div class="modal fade" id="broadcastModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-megaphone me-2"></i>Broadcast Notification</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/notifications/broadcast}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-600">Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Platform Maintenance Notice" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-600">Message <span class="text-danger">*</span></label>
                        <textarea name="message" class="form-control" rows="4"
                                  placeholder="Your message to all users..." required></textarea>
                    </div>
                    <div class="alert alert-info small mb-0">
                        <i class="bi bi-info-circle me-1"></i>This notification will be visible to all users on their Notifications page.
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary-custom"><i class="bi bi-send me-1"></i>Broadcast</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click',function(){
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
</script>
</body>
</html>
