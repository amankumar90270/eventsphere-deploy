<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bookings - EventSphere Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{admin/adminheader :: header}"></div>

    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-search">
                <i class="bi bi-search position-absolute ms-3 mt-2"></i>
                <input type="text" id="searchInput" placeholder="Search bookings..." onkeyup="filterTable()">
            </div>
            <div class="navbar-actions">
                <div class="user-profile">
                    <div class="user-avatar">AD</div>
                    <div class="d-none d-md-block"><div class="fw-600">Admin</div><small class="text-muted">Administrator</small></div>
                </div>
            </div>
        </nav>

        <div class="p-4">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Bookings</h2>
                    <p class="text-muted mb-0">All event bookings across the platform</p>
                </div>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="table-card p-3 d-flex align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center bg-primary bg-opacity-10" style="width:50px;height:50px">
                            <i class="bi bi-ticket-perforated text-primary fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold fs-5" th:text="${confirmed + pending + cancelled}">0</div>
                            <div class="text-muted small">Total Bookings</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="table-card p-3 d-flex align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center bg-success bg-opacity-10" style="width:50px;height:50px">
                            <i class="bi bi-check-circle text-success fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold fs-5" th:text="${confirmed}">0</div>
                            <div class="text-muted small">Confirmed</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="table-card p-3 d-flex align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center bg-warning bg-opacity-10" style="width:50px;height:50px">
                            <i class="bi bi-clock text-warning fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold fs-5" th:text="${pending}">0</div>
                            <div class="text-muted small">Pending</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="table-card p-3 d-flex align-items-center gap-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center bg-info bg-opacity-10" style="width:50px;height:50px">
                            <i class="bi bi-currency-rupee text-info fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold fs-5">₹<span th:text="${#numbers.formatDecimal(totalRevenue, 1, 'COMMA', 0, 'POINT')}">0</span></div>
                            <div class="text-muted small">Total Revenue</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status filter -->
            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-sm btn-primary" onclick="filterStatus('ALL')">All</button>
                <button class="btn btn-sm btn-outline-success" onclick="filterStatus('CONFIRMED')">Confirmed</button>
                <button class="btn btn-sm btn-outline-warning" onclick="filterStatus('PENDING')">Pending</button>
                <button class="btn btn-sm btn-outline-danger" onclick="filterStatus('CANCELLED')">Cancelled</button>
            </div>

            <!-- Bookings Table -->
            <div class="table-card p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="bookingsTable">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Booking Ref</th>
                            <th>User</th>
                            <th>Event</th>
                            <th>Organiser</th>
                            <th>Qty</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="10" class="text-center py-5 text-muted">
                                <i class="bi bi-ticket-perforated fs-1 d-block mb-2"></i>
                                No bookings found yet.
                            </td>
                        </tr>
                        <tr th:each="b, i : ${bookings}" th:data-status="${b.status}">
                            <td class="ps-4 text-muted" th:text="${i.count}"></td>
                            <td>
                                <code class="text-primary" th:text="${b.bookingRef}"></code>
                            </td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold"
                                         style="width:32px;height:32px;font-size:.75rem;"
                                         th:text="${b.user.initials}">??</div>
                                    <span th:text="${b.user.fullName}"></span>
                                </div>
                            </td>
                            <td>
                                <div class="fw-600 small" th:text="${b.event.title}"></div>
                                <small class="text-muted" th:text="${b.event.city}"></small>
                            </td>
                            <td class="small" th:text="${b.event.organizer.fullName}"></td>
                            <td th:text="${b.quantity}"></td>
                            <td class="fw-600">₹<span th:text="${#numbers.formatDecimal(b.totalAmount, 1, 'COMMA', 0, 'POINT')}"></span></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.status.name() == 'CONFIRMED'} ? 'bg-success' : (${b.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-danger')"
                                      th:text="${b.status}"></span>
                            </td>
                            <td class="small text-muted" th:text="${#temporals.format(b.createdAt, 'dd MMM yyyy')}"></td>
                            <td>
                                <form th:action="@{/admin/bookings/cancel/{id}(id=${b.id})}" method="post" class="d-inline"
                                      th:if="${b.status.name() != 'CANCELLED'}"
                                      onsubmit="return confirm('Cancel this booking?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Cancel">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </form>
                                <span th:if="${b.status.name() == 'CANCELLED'}" class="text-muted small">—</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
    function filterStatus(status) {
        document.querySelectorAll('#bookingsTable tbody tr[data-status]').forEach(tr => {
            tr.style.display = (status === 'ALL' || tr.dataset.status === status) ? '' : 'none';
        });
    }
    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#bookingsTable tbody tr[data-status]').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }
</script>
</body>
</html>
