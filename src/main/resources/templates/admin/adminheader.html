<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:fragment="header">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <i class="bi bi-person-circle"></i> My Account
            </div>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-label">Main</div>
            <a th:href="@{/admin/dashboard}" class="sidebar-menu-item">
                <i class="bi bi-speedometer2"></i><span>Dashboard</span>
            </a>

            <div class="menu-label">Management</div>
            <a th:href="@{/admin/usermanagement}" class="sidebar-menu-item">
                <i class="bi bi-people"></i><span>Users</span>
            </a>
            <a th:href="@{/admin/categories}" class="sidebar-menu-item">
                <i class="bi bi-tag"></i><span>Categories</span>
            </a>
            <a th:href="@{/admin/approvals}" class="sidebar-menu-item">
                <i class="bi bi-calendar-check"></i><span>Event Approvals</span>
                <span class="badge bg-warning text-dark ms-auto">12</span>
            </a>
            <a th:href="@{/admin/bookings}" class="sidebar-menu-item">
                <i class="bi bi-ticket-perforated"></i><span>Bookings</span>
            </a>

            <div class="menu-label">Finance</div>
            <a th:href="@{/admin/payments}" class="sidebar-menu-item">
                <i class="bi bi-credit-card"></i><span>Payments</span>
            </a>

            <div class="menu-label">System</div>
            <a th:href="@{/admin/notifications}" class="sidebar-menu-item">
                <i class="bi bi-bell"></i><span>Notifications</span>
                <span class="badge bg-danger ms-auto">5</span>
            </a>
            <a th:href="@{/admin/reports}" class="sidebar-menu-item">
                <i class="bi bi-bar-chart"></i><span>Reports</span>
            </a>
            <a th:href="@{/admin/contacts}" class="sidebar-menu-item">
                <i class="bi bi-envelope"></i><span>Contact Messages</span>
            </a>

            <hr class="border-secondary my-2"/>

            <form th:action="@{/logout}" method="post" style="display:inline;width:100%">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit"
                        class="sidebar-menu-item w-100 text-danger"
                        style="background:none;border:none;cursor:pointer;text-align:left;padding:0.5rem 1rem">
                    <i class="bi bi-box-arrow-left"></i><span>Logout</span>
                </button>
            </form>
        </nav>
    </aside>
</div>
</body>
</html>
