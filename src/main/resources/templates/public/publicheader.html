<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Header</title>
</head>
<body>
<div th:fragment="publicheader">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" th:href="@{/public/index}">
                <i class="bi bi-ticket-perforated"></i> EventSphere
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1">

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/public/index}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/public/upcomingevents}">Upcoming Events</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/public/liveevents}">Live Events</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/public/about}">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/public/contact}">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/public/faq}">FAQ</a>
                    </li>

                    <li sec:authorize="!isAuthenticated()">
                        <a class="nav-link btn btn-outline-light btn-sm px-3 ms-2" th:href="@{/login}">Login</a>
                    </li>

                    <li sec:authorize="!isAuthenticated()">
                        <a class="nav-link btn btn-primary btn-sm px-3 ms-1" th:href="@{/register}">Register</a>
                    </li>

                    <li sec:authorize="isAuthenticated()" class="nav-item">
                        <a class="nav-link btn btn-primary btn-sm px-3 ms-1" th:href="@{/user/dashboard}">My Account</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
