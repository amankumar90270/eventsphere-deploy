<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Events - EventSphere</title>
  <style>
    .page-header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:4rem 0 2rem;}
    .view-toggle button{background:#fff;border:1px solid #dee2e6;padding:.5rem 1rem;border-radius:8px;cursor:pointer;transition:.2s;}
    .view-toggle button.active{background:#1a73e8;color:#fff;border-color:#1a73e8;}
    .event-list-item{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:1.5rem;display:flex;gap:1.5rem;transition:.3s;}
    .event-list-item:hover{box-shadow:0 8px 30px rgba(0,0,0,.12);transform:translateY(-3px);}
    .event-list-img{width:220px;height:160px;border-radius:10px;overflow:hidden;flex-shrink:0;}
    .event-list-img img{width:100%;height:100%;object-fit:cover;}
    .filter-bar{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.07);}
  </style>
</head>
<body>
<div th:replace="~{public/publicheader :: publicheader}"></div>

<div class="page-header">
  <div class="container text-center">
    <h1 class="display-4 fw-bold mb-3">Upcoming Events</h1>
    <p class="fs-5">Discover amazing events happening near you</p>
  </div>
</div>

<div class="container my-5">
  <div class="row">
    <!-- Sidebar Filters -->
    <div class="col-lg-3">
      <div class="filter-bar mb-4">
        <h5 class="fw-bold mb-4">Filters</h5>
        <form id="filterForm" th:action="@{/public/upcomingevents}" method="get">
          <div class="mb-4">
            <label class="form-label fw-600">Search</label>
            <div class="input-group">
              <input type="text" class="form-control" name="keyword"
                     th:value="${param.keyword}" placeholder="Search events...">
              <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-600">Category</label>
            <select class="form-select" name="category" onchange="this.form.submit()">
              <option value="">All Categories</option>
              <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"
                      th:selected="${param.category != null and param.category[0] == cat.name}">Category</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-600">City</label>
            <select class="form-select" name="city" onchange="this.form.submit()">
              <option value="">All Cities</option>
              <option th:each="event : ${events}" th:value="${event.city}" th:text="${event.city}"
                      th:selected="${param.city != null and param.city[0] == event.city}">City</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-600">Price</label>
            <select class="form-select" name="price" onchange="this.form.submit()">
              <option value="">Any Price</option>
              <option value="free" th:selected="${param.price != null and param.price[0]=='free'}">Free</option>
              <option value="paid" th:selected="${param.price != null and param.price[0]=='paid'}">Paid</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary-custom w-100 mb-2">Apply Filters</button>
          <a th:href="@{/public/upcomingevents}" class="btn btn-outline-secondary w-100">Clear All</a>
        </form>
      </div>
    </div>

    <!-- Events List -->
    <div class="col-lg-9">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">
          Showing <span th:text="${#lists.size(events)}">0</span> Events
        </h5>
        <div class="d-flex gap-3 align-items-center">
          <div class="view-toggle">
            <button class="active" id="btnGrid" onclick="toggleView('grid')"><i class="bi bi-grid"></i></button>
            <button id="btnList" onclick="toggleView('list')"><i class="bi bi-list"></i></button>
          </div>
        </div>
      </div>

      <!-- No events -->
      <div th:if="${#lists.isEmpty(events)}" class="text-center py-5 text-muted">
        <i class="bi bi-calendar-x fs-1 mb-3 d-block"></i>
        <h5>No events found</h5>
        <p>Try adjusting your filters or <a th:href="@{/public/upcomingevents}">clear all filters</a>.</p>
      </div>

      <!-- Grid View -->
      <div id="gridView" class="row g-4" th:unless="${#lists.isEmpty(events)}">
        <div class="col-md-6 col-lg-4" th:each="event : ${events}">
          <div class="event-card">
            <div class="event-card-img">
              <img th:src="${event.imageUrl != null ? event.imageUrl : 'https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=400'}"
                   th:alt="${event.title}" alt="Event">
              <span class="event-badge" th:text="${event.category != null ? event.category.name : 'Event'}">Event</span>
            </div>
            <div class="event-card-body">
              <h3 class="event-title" th:text="${event.title}">Title</h3>
              <div class="event-meta">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(event.startDate,'dd MMM yyyy')}">Date</span>
              </div>
              <div class="event-meta">
                <i class="bi bi-geo-alt"></i>
                <span th:text="${event.city}">City</span>
              </div>
              <div class="event-price" th:text="${event.formattedPrice}">₹0</div>
              <a th:href="@{/public/eventdetails/{id}(id=${event.id})}" class="btn-book-now">Book Now</a>
            </div>
          </div>
        </div>
      </div>

      <!-- List View (hidden by default) -->
      <div id="listView" class="d-none" th:unless="${#lists.isEmpty(events)}">
        <div class="event-list-item" th:each="event : ${events}">
          <div class="event-list-img">
            <img th:src="${event.imageUrl != null ? event.imageUrl : 'https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=400'}"
                 th:alt="${event.title}" alt="Event">
          </div>
          <div class="event-list-content">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h3 class="event-title mb-1" th:text="${event.title}">Title</h3>
              <span class="event-badge" th:text="${event.category != null ? event.category.name : 'Event'}">Cat</span>
            </div>
            <div class="event-meta mb-1">
              <i class="bi bi-calendar3"></i>
              <span th:text="${#temporals.format(event.startDate,'EEE, dd MMM yyyy')}">Date</span>
            </div>
            <div class="event-meta mb-2">
              <i class="bi bi-geo-alt"></i>
              <span th:text="${event.venue + ', ' + event.city}">Venue</span>
            </div>
            <p class="text-muted small mb-3"
               th:text="${event.description != null ? (event.description.length() > 120 ? event.description.substring(0,120)+'...' : event.description) : ''}"></p>
            <div class="d-flex justify-content-between align-items-center">
              <div class="event-price" th:text="${event.formattedPrice}">₹0</div>
              <a th:href="@{/public/eventdetails/{id}(id=${event.id})}" class="btn btn-primary-custom">Book Now</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{public/publicfooter :: publicfooter}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleView(view) {
    const g = document.getElementById('gridView'), l = document.getElementById('listView');
    const bg = document.getElementById('btnGrid'), bl = document.getElementById('btnList');
    if (view === 'grid') {
      g && g.classList.remove('d-none'); l && l.classList.add('d-none');
      bg.classList.add('active'); bl.classList.remove('active');
    } else {
      g && g.classList.add('d-none'); l && l.classList.remove('d-none');
      bl.classList.add('active'); bg.classList.remove('active');
    }
  }
</script>
</body>
</html>
