<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Live Events - EventSphere</title>
    <style>
        :root{--primary:#1a73e8;--primary-dark:#0d47a1;--live:#e53935;}
        .live-hero{background:linear-gradient(135deg,#0d1b3e 0%,#1a3a6e 60%,#e53935 100%);padding:60px 0 40px;color:#fff;}
        .live-badge{background:var(--live);color:#fff;padding:6px 16px;border-radius:50px;font-size:.8rem;font-weight:700;display:inline-flex;align-items:center;gap:6px;animation:pulse 1.5s infinite;}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.5);}50%{box-shadow:0 0 0 10px rgba(229,57,53,0);}}
        .live-dot{width:8px;height:8px;background:#fff;border-radius:50%;display:inline-block;animation:blink 1s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
        .event-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:.3s;height:100%;}
        .event-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.15);}
        .event-img{position:relative;height:200px;overflow:hidden;}
        .event-img img{width:100%;height:100%;object-fit:cover;transition:.4s;}
        .event-card:hover .event-img img{transform:scale(1.05);}
        .live-overlay{position:absolute;top:10px;left:10px;}
        .price-badge{background:var(--primary);color:#fff;padding:4px 12px;border-radius:50px;font-size:.82rem;font-weight:600;}
        .btn-book{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-weight:600;transition:.2s;text-decoration:none;display:inline-block;}
        .btn-book:hover{background:var(--primary-dark);color:#fff;}
        .stats-bar{background:#0d1b3e;color:#fff;padding:14px 0;}
        .stat-num{font-size:1.5rem;font-weight:700;color:#4fc3f7;}
    </style>
</head>
<body>
<div th:replace="~{public/publicheader :: publicheader}"></div>

<section class="live-hero">
    <div class="container text-center">
        <span class="live-badge mb-3"><span class="live-dot"></span> LIVE NOW</span>
        <h1 class="display-5 fw-bold mt-3">Live &amp; Happening Now</h1>
        <p class="lead opacity-75 mt-2">Join thousands of people attending live events right now</p>
    </div>
</section>

<div class="stats-bar">
    <div class="container">
        <div class="row text-center">
            <div class="col-4"><div class="stat-num" th:text="${#lists.size(events)}">0</div><div style="font-size:.75rem;opacity:.7;">Events Live Now</div></div>
            <div class="col-4"><div class="stat-num"></div><div style="font-size:.75rem;opacity:.7;"></div></div>
            <div class="col-4"><div class="stat-num" th:text="${#lists.size(categories)}">0</div><div style="font-size:.75rem;opacity:.7;">Categories</div></div>
        </div>
    </div>
</div>

<div class="container my-5">
    <!-- No events -->
    <div th:if="${#lists.isEmpty(events)}" class="text-center py-5 text-muted">
        <i class="bi bi-broadcast fs-1 mb-3 d-block text-danger"></i>
        <h4>No live events right now</h4>
        <p>Check back soon or <a th:href="@{/public/upcomingevents}">browse upcoming events</a>.</p>
    </div>

    <div th:unless="${#lists.isEmpty(events)}">
        <h2 class="fw-bold mb-4">
            <span class="live-badge me-2"><span class="live-dot"></span></span>Happening Right Now
        </h2>
        <div class="row g-4">
            <div class="col-md-4" th:each="event : ${events}">
                <div class="event-card">
                    <div class="event-img">
                        <img th:src="${event.imageUrl != null ? event.imageUrl : 'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=400&h=200&fit=crop'}"
                             th:alt="${event.title}" alt="Event"/>
                        <div class="live-overlay">
                            <span class="live-badge"><span class="live-dot"></span> LIVE</span>
                        </div>
                    </div>
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge bg-danger" th:text="${event.category != null ? event.category.name : 'Event'}">Category</span>
                            <span class="price-badge" th:text="${event.formattedPrice}">₹0</span>
                        </div>
                        <h5 class="fw-bold mb-1" th:text="${event.title}">Event Title</h5>
                        <p class="text-muted small mb-2"><i class="bi bi-geo-alt"></i>
                            <span th:text="${event.venue + ', ' + event.city}">Venue</span>
                        </p>
                        <div class="progress mb-3" style="height:4px;">
                            <div class="progress-bar bg-danger"
                                 th:style="'width:' + ${event.occupancyPercent} + '%'"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <a th:href="@{/public/eventdetails/{id}(id=${event.id})}" class="btn-book flex-fill text-center">Book Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{public/publicfooter :: publicfooter}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
