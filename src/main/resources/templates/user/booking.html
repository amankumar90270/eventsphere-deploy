<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Bookings - EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
    <style>
        .booking-card { background:#fff; border-radius:16px; padding:1.25rem; box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:1rem; transition:.2s; }
        .booking-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.1); }
        .status-badge { padding:.3rem .75rem; border-radius:20px; font-size:.78rem; font-weight:600; }
        .status-CONFIRMED { background:#d1fae5; color:#065f46; }
        .status-PENDING   { background:#fef3c7; color:#92400e; }
        .status-CANCELLED { background:#fee2e2; color:#991b1b; }
        .event-icon-box { width:70px; height:70px; border-radius:12px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{user/userheader :: header}"></div>

    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-search">
                <i class="bi bi-search position-absolute ms-3 mt-2"></i>
                <input type="text" id="searchInput" placeholder="Search bookings..." onkeyup="filterBookings()">
            </div>
            <div class="navbar-actions">
                <div class="notification-icon"><i class="bi bi-bell"></i><span class="notification-badge">0</span></div>
                <div class="user-profile">
                    <div class="user-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${user != null ? user.fullName : 'User'}">User</div>
                        <small class="text-muted">Member</small>
                    </div>
                </div>
            </div>
        </nav>

        <div class="p-4">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">My Bookings</h2>
                    <p class="text-muted mb-0">All your event bookings in one place</p>
                </div>
                <a th:href="@{/user/browseevents}" class="btn btn-primary-custom">
                    <i class="bi bi-plus-lg me-2"></i>Book More Events
                </a>
            </div>

            <!-- Status filter tabs -->
            <div class="d-flex gap-2 mb-4 flex-wrap">
                <button class="btn btn-sm btn-primary" onclick="filterStatus('ALL')">All Bookings</button>
                <button class="btn btn-sm btn-outline-success" onclick="filterStatus('CONFIRMED')">Confirmed</button>
                <button class="btn btn-sm btn-outline-warning" onclick="filterStatus('PENDING')">Pending</button>
                <button class="btn btn-sm btn-outline-danger" onclick="filterStatus('CANCELLED')">Cancelled</button>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
                <i class="bi bi-ticket-perforated fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">No bookings yet</h5>
                <p class="text-muted small">Browse events and book your first ticket!</p>
                <a th:href="@{/user/browseevents}" class="btn btn-primary-custom mt-2">
                    <i class="bi bi-grid me-2"></i>Browse Events
                </a>
            </div>

            <!-- Booking cards -->
            <div id="bookingsContainer">
                <div th:each="b : ${bookings}"
                     class="booking-card"
                     th:data-status="${b.status}"
                     th:data-text="${b.event.title + ' ' + b.bookingRef}">
                    <div class="d-flex gap-3 align-items-start">
                        <!-- Icon -->
                        <div class="event-icon-box">
                            <i th:class="'bi text-white fs-3 ' + (b.event.category != null ? (b.event.category.icon != null ? b.event.category.icon : 'bi-calendar-event') : 'bi-calendar-event')"></i>
                        </div>

                        <!-- Info -->
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                                <div>
                                    <h5 class="fw-bold mb-1" th:text="${b.event.title}">Event Title</h5>
                                    <div class="text-muted small mb-1">
                                        <i class="bi bi-calendar3 me-1"></i>
                                        <span th:text="${b.event.startDate}">Date</span>
                                        &nbsp;|&nbsp;
                                        <i class="bi bi-geo-alt me-1"></i>
                                        <span th:text="${b.event.venue + ', ' + b.event.city}">Venue</span>
                                    </div>
                                    <div class="text-muted small">
                                        <i class="bi bi-person-badge me-1"></i>Organiser:
                                        <span th:text="${b.event.organizer.fullName}">Organiser</span>
                                        &nbsp;|&nbsp;
                                        <i class="bi bi-hash me-1"></i>Ref:
                                        <code th:text="${b.bookingRef}">REF</code>
                                    </div>
                                </div>
                                <span class="status-badge"
                                      th:classappend="'status-' + ${b.status}"
                                      th:text="${b.status}">STATUS</span>
                            </div>

                            <hr class="my-2"/>

                            <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                    <span class="text-muted small">Tickets: </span>
                                    <span class="fw-600" th:text="${b.quantity}">1</span>
                                </div>
                                <div class="col-auto">
                                    <span class="text-muted small">Total: </span>
                                    <span class="fw-bold text-primary">₹<span th:text="${#numbers.formatDecimal(b.totalAmount,1,'COMMA',0,'POINT')}">0</span></span>
                                </div>
                                <div class="col-auto ms-auto d-flex gap-2">
                                    <a th:href="@{/user/ticketdownload(bookingId=${b.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-download me-1"></i>Ticket
                                    </a>
                                    <form th:action="@{/user/booking/cancel/{id}(id=${b.id})}" method="post"
                                          th:if="${b.status.name() != 'CANCELLED'}"
                                          onsubmit="return confirm('Cancel this booking? This cannot be undone.')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-x-circle me-1"></i>Cancel
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
    function filterStatus(status) {
        document.querySelectorAll('#bookingsContainer .booking-card').forEach(card => {
            card.style.display = (status === 'ALL' || card.dataset.status === status) ? '' : 'none';
        });
    }
    function filterBookings() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#bookingsContainer .booking-card').forEach(card => {
            card.style.display = (card.dataset.text || '').toLowerCase().includes(q) ? '' : 'none';
        });
    }
</script>
</body>
</html>
