<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notifications - EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
    <style>
        .notif-item{background:#fff;border-radius:12px;padding:1.1rem 1.4rem;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:1rem;border-left:4px solid transparent;}
        .notif-item.unread{border-left-color:#6366f1;background:#f5f5ff;}
        .notif-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;color:white;background:#6366f1;}
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{user/userheader :: header}"></div>
    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-actions">
                <div class="notification-icon">
                    <i class="bi bi-bell"></i>
                    <span class="notification-badge" th:text="${unreadCount}">0</span>
                </div>
                <div class="user-profile">
                    <div class="user-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${user != null ? user.fullName : 'User'}">User</div>
                        <small class="text-muted">Member</small>
                    </div>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Notifications</h2>
                    <p class="text-muted mb-0">
                        <span th:text="${unreadCount}">0</span> unread notifications
                    </p>
                </div>
                <span class="badge bg-primary px-3 py-2" th:text="${#lists.size(notifications)} + ' Total'">0 Total</span>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5">
                <i class="bi bi-bell-slash fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">No notifications yet</h5>
                <p class="text-muted small">You'll see booking confirmations, event reminders and announcements here.</p>
            </div>

            <!-- Notification items -->
            <div th:each="n : ${notifications}"
                 th:classappend="${!n.readed} ? 'unread' : ''"
                 class="notif-item">
                <div class="notif-icon">
                    <i th:class="${'bi ' + (n.icon != null ? n.icon : 'bi-bell')}"></i>
                </div>
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start">
                        <h6 class="fw-bold mb-1" th:text="${n.title}">Title</h6>
                        <div class="d-flex align-items-center gap-2">
                            <span th:if="${!n.readed}" class="badge bg-primary" style="font-size:.65rem;">New</span>
                            <small class="text-muted" th:text="${#temporals.format(n.createdAt,'dd MMM, HH:mm')}">Time</small>
                        </div>
                    </div>
                    <p class="text-muted small mb-0" th:text="${n.message}">Message</p>
                    <span th:if="${n.type != null}" class="badge bg-light text-dark border mt-1 small" th:text="${n.type}">TYPE</span>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click',function(){
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
</script>
</body>
</html>
