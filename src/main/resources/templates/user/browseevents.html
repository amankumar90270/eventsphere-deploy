<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Browse Events - EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{user/userheader :: header}"></div>

    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-search">
                <i class="bi bi-search position-absolute ms-3 mt-2"></i>
                <input type="text" id="searchInput" placeholder="Search events, venues..." onkeyup="filterEvents()">
            </div>
            <div class="navbar-actions">
                <div class="notification-icon"><i class="bi bi-bell"></i><span class="notification-badge">0</span></div>
                <div class="user-profile">
                    <div class="user-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${user != null ? user.fullName : 'User'}">User</div>
                        <small class="text-muted">Member</small>
                    </div>
                </div>
            </div>
        </nav>

        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">Browse Events</h2>
                <p class="text-muted">Discover amazing events happening around you</p>
            </div>

            <div class="row g-4">
                <!-- Filters Sidebar -->
                <div class="col-xl-3 col-lg-4">
                    <div class="table-card p-4">
                        <h5 class="fw-bold mb-3">Filters</h5>
                        <div class="mb-4">
                            <label class="form-label fw-600">Category</label>
                            <div th:each="cat : ${categories}" class="form-check mb-1">
                                <input class="form-check-input cat-filter" type="checkbox"
                                       th:id="'cat-' + ${cat.id}"
                                       th:value="${cat.name}"
                                       onchange="filterEvents()"/>
                                <label class="form-check-label" th:for="'cat-' + ${cat.id}" th:text="${cat.name}">Category</label>
                            </div>
                        </div>
                        <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">Clear Filters</button>
                    </div>
                </div>

                <!-- Events Grid -->
                <div class="col-xl-9 col-lg-8">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted fw-500">
                            <span th:text="${#lists.size(events)}">0</span> events found
                        </span>
                    </div>

                    <!-- Empty state -->
                    <div th:if="${#lists.isEmpty(events)}" class="text-center py-5">
                        <i class="bi bi-calendar-x fs-1 text-muted d-block mb-3"></i>
                        <h5 class="text-muted">No events available right now</h5>
                        <p class="text-muted small">Check back soon or ask an organiser to create events.</p>
                    </div>

                    <div class="row g-4" id="eventsGrid">
                        <div th:each="event : ${events}" class="col-md-4 event-item"
                             th:data-category="${event.category != null ? event.category.name : ''}">
                            <div class="event-card">
                                <div class="event-card-img" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);height:180px;display:flex;align-items:center;justify-content:center;">
                                    <i th:class="'bi fs-1 text-white ' + (event.category != null ? (event.category.icon != null ? event.category.icon : 'bi-calendar-event') : 'bi-calendar-event')"></i>
                                    <span class="event-badge" th:if="${event.featured}">Featured</span>
                                    <span class="event-badge" style="background:#dc3545;" th:if="${event.status.name() == 'LIVE'}">Live Now</span>
                                    <img th:if="${event.imageUrl != null and !event.imageUrl.isEmpty()}"
                                         th:src="${event.imageUrl}" alt="Event Banner" class="event-banner mb-4">
                                </div>
                                <div class="event-card-body">
                                    <div class="event-meta">
                                        <i class="bi bi-calendar3"></i>
                                        <span th:text="${event.startDate}">Date</span>
                                        &nbsp;|&nbsp;
                                        <i class="bi bi-geo-alt"></i>
                                        <span th:text="${event.city}">City</span>
                                    </div>
                                    <h3 class="event-title" th:text="${event.title}">Event Title</h3>
                                    <div class="mb-1">
                                        <span class="badge bg-secondary small" th:if="${event.category != null}" th:text="${event.category.name}"></span>
                                    </div>
                                    <div class="event-price" th:text="${event.formattedPrice}">Price</div>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/user/eventdetails/{id}(id=${event.id})}" class="btn-book-now flex-grow-1">View Details</a>
                                        <a th:href="@{/user/checkout(eventId=${event.id}, qty=1)}" class="btn btn-sm btn-primary-custom"
                                           th:if="${event.availableSeats > 0}">
                                            <i class="bi bi-ticket-perforated"></i> Book
                                        </a>
                                        <span class="btn btn-sm btn-secondary disabled" th:unless="${event.availableSeats > 0}">Sold Out</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });

    function filterEvents() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const checked = [...document.querySelectorAll('.cat-filter:checked')].map(c => c.value);
        document.querySelectorAll('.event-item').forEach(item => {
            const text = item.innerText.toLowerCase();
            const cat  = item.dataset.category || '';
            const matchQ = !q || text.includes(q);
            const matchC = checked.length === 0 || checked.includes(cat);
            item.style.display = (matchQ && matchC) ? '' : 'none';
        });
    }

    function clearFilters() {
        document.querySelectorAll('.cat-filter').forEach(c => c.checked = false);
        document.getElementById('searchInput').value = '';
        filterEvents();
    }
</script>
</body>
</html>
