<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>User Header</title>
</head>
<body>
<div th:fragment="header">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <i class="bi bi-person-circle"></i> My Account
            </div>
        </div>

        <nav class="sidebar-menu">
            <a th:href="@{/user/dashboard}" class="sidebar-menu-item">
                <i class="bi bi-house-door"></i><span>Dashboard</span>
            </a>

            <a th:href="@{/user/browseevents}" class="sidebar-menu-item">
                <i class="bi bi-calendar3"></i><span>Browse Events</span>
            </a>

            <a th:href="@{/user/booking}" class="sidebar-menu-item">
                <i class="bi bi-ticket-perforated"></i><span>My Bookings</span>
            </a>

            <a th:href="@{/user/coupons}" class="sidebar-menu-item">
                <i class="bi bi-tag"></i><span>Coupons &amp; Offers</span>
            </a>

            <a th:href="@{/user/notifications}" class="sidebar-menu-item">
                <i class="bi bi-bell"></i><span>Notifications</span>
            </a>

            <a th:href="@{/user/profile}" class="sidebar-menu-item">
                <i class="bi bi-person-gear"></i><span>Profile Settings</span>
            </a>

            <form th:action="@{/logout}" method="post" style="display:inline;width:100%">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit"
                        class="sidebar-menu-item w-100 text-danger"
                        style="background:none;border:none;cursor:pointer;text-align:left;padding:0.5rem 1rem">
                    <i class="bi bi-box-arrow-left"></i><span>Logout</span>
                </button>
            </form>
        </nav>
    </aside>
</div>
</body>
</html>
