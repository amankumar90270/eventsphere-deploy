<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Coupons - EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/main.css}" rel="stylesheet"/>
    <style>
        .coupon-card{background:#fff;border-radius:14px;padding:1.25rem 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1rem;border-left:5px solid #6366f1;position:relative;overflow:hidden;}
        .coupon-card::after{content:'%';position:absolute;right:-10px;top:-15px;font-size:6rem;font-weight:800;color:rgba(99,102,241,.07);line-height:1;}
        .coupon-code{font-family:monospace;font-size:1.2rem;font-weight:700;color:#6366f1;letter-spacing:.1rem;background:#f5f5ff;padding:.3rem .8rem;border-radius:8px;border:1.5px dashed #6366f1;}
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{user/userheader :: header}"></div>
    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-actions">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${user != null ? user.fullName : 'User'}">User</div>
                        <small class="text-muted">Member</small>
                    </div>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">Available Coupons</h2>
                <p class="text-muted">Use these codes at checkout to save on your bookings</p>
            </div>

            <div th:if="${#lists.isEmpty(coupons)}" class="text-center py-5">
                <i class="bi bi-tag-slash fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">No coupons available right now</h5>
                <p class="text-muted small">Check back later for discounts and special offers.</p>
            </div>

            <div class="row g-3">
                <div th:each="c : ${coupons}" class="col-md-6 col-lg-4">
                    <div class="coupon-card">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="coupon-code" th:text="${c.code}">CODE</span>
                            <span class="badge bg-success">Active</span>
                        </div>
                        <div class="fw-bold fs-5 text-primary mb-1">
                            <span th:text="${c.discountPercent} + '% OFF'">OFF</span>
                        </div>
                        <p class="text-muted small mb-2" th:text="${c.description != null ? c.description : 'Discount coupon'}">Description</p>
                        <div class="small text-muted" th:if="${c.expiryDate != null}">
                            <i class="bi bi-clock me-1"></i>Expires: <span th:text="${c.expiryDate}">Date</span>
                        </div>
                        <button class="btn btn-sm btn-outline-primary mt-2 w-100"
                                th:data-code="${c.code}"
                                onclick="copyCode(this)">
                            <i class="bi bi-clipboard me-1"></i>Copy Code
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <a th:href="@{/user/browseevents}" class="btn btn-primary-custom">
                    <i class="bi bi-grid me-2"></i>Browse Events &amp; Use Coupon
                </a>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click',function(){
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
    function copyCode(btn){
        navigator.clipboard.writeText(btn.dataset.code).then(()=>{
            btn.innerHTML='<i class="bi bi-check me-1"></i>Copied!';
            btn.classList.replace('btn-outline-primary','btn-success');
            setTimeout(()=>{
                btn.innerHTML='<i class="bi bi-clipboard me-1"></i>Copy Code';
                btn.classList.replace('btn-success','btn-outline-primary');
            },2000);
        });
    }
</script>
</body>
</html>
