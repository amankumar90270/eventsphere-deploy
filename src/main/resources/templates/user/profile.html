<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - EventSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link th:href="@{/css/main.css}" rel="stylesheet" />
</head>

<body>
    <div class="dashboard-wrapper">
        <div th:replace="~{user/userheader :: header}"></div>
        <main class="main-content" id="mainContent">
            <nav class="dashboard-navbar">
                <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
                <div class="navbar-actions">
                    <div class="user-profile">
                        <div class="user-avatar" th:text="${user != null ? user.initials : 'U'}">U</div>
                        <div class="d-none d-md-block">
                            <div class="fw-600" th:text="${user != null ? user.fullName : 'User'}">User</div>
                            <small class="text-muted">Member</small>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="p-4">
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="mb-4">
                    <h2 class="fw-bold mb-1">My Profile</h2>
                    <p class="text-muted">Manage your account information</p>
                </div>

                <div class="row g-4">
                    <!-- Profile Card -->
                    <div class="col-lg-4">
                        <div class="table-card p-4 text-center">
                            <div class="rounded-circle d-inline-flex align-items-center justify-content-center fw-bold text-white fs-1 mb-3"
                                style="width:100px;height:100px;background:linear-gradient(135deg,#6366f1,#8b5cf6);"
                                th:text="${user != null ? user.initials : 'U'}">U</div>
                            <h4 class="fw-bold" th:text="${user != null ? user.fullName : ''}"></h4>
                            <p class="text-muted" th:text="${user != null ? user.email : ''}"></p>
                            <div class="row g-2 mt-3">
                                <div class="col-6">
                                    <div class="fw-bold text-primary" th:text="${totalBookings}">0</div>
                                    <div class="text-muted small">Bookings</div>
                                </div>
                                <div class="col-6">
                                    <div class="fw-bold text-success" th:text="${user != null ? user.city : '—'}">—
                                    </div>
                                    <div class="text-muted small">City</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Edit Form -->
                    <div class="col-lg-8">
                        <div class="table-card p-4">
                            <h5 class="fw-bold mb-4">Edit Profile</h5>
                            <form th:action="@{/user/profile/update}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">First Name</label>
                                        <input type="text" name="firstName" class="form-control"
                                            th:value="${user != null ? user.firstName : ''}" required />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">Last Name</label>
                                        <input type="text" name="lastName" class="form-control"
                                            th:value="${user != null ? user.lastName : ''}" required />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">Email</label>
                                        <input type="email" class="form-control"
                                            th:value="${user != null ? user.email : ''}" disabled />
                                        <div class="form-text">Email cannot be changed</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">Phone</label>
                                        <input type="text" name="phone" class="form-control"
                                            th:value="${user != null ? user.phone : ''}" />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-600">City</label>
                                        <input type="text" name="city" class="form-control"
                                            th:value="${user != null ? user.city : ''}" />
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-600">Bio</label>
                                        <textarea name="bio" class="form-control" rows="3"
                                            placeholder="Tell us a bit about yourself..."
                                            th:text="${user != null ? user.bio : ''}"></textarea>
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <button type="submit" class="btn btn-primary-custom">
                                        <i class="bi bi-check-lg me-2"></i>Save Changes
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function () {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
    </script>
</body>

</html>
