<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile - EventSphere Organiser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{organizer/organizerheader :: organizerheader}"></div>
    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-actions ms-auto">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${organizer != null ? organizer.initials : 'OR'}">OR</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${organizer != null ? organizer.fullName : 'Organiser'}">Organiser</div>
                        <small class="text-muted">Event Organiser</small>
                    </div>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="mb-4">
                <h2 class="fw-bold mb-1">My Profile</h2>
                <p class="text-muted">Manage your organiser account and organisation details</p>
            </div>

            <div class="row g-4">
                <!-- Profile Card -->
                <div class="col-lg-4">
                    <div class="table-card p-4 text-center">
                        <div class="rounded-circle d-inline-flex align-items-center justify-content-center fw-bold text-white fs-1 mb-3"
                             style="width:100px;height:100px;background:linear-gradient(135deg,#6366f1,#8b5cf6);"
                             th:text="${organizer != null ? organizer.initials : 'OR'}">OR</div>
                        <h4 class="fw-bold" th:text="${organizer != null ? organizer.fullName : ''}"></h4>
                        <p class="text-muted" th:text="${organizer != null ? organizer.organizationName : ''}"></p>
                        <div class="row g-2 mt-3 text-center">
                            <div class="col-6">
                                <div class="fw-bold text-primary" th:text="${eventCount}">0</div>
                                <div class="text-muted small">Events</div>
                            </div>
                            <div class="col-6">
                                <div class="fw-bold text-success">₹<span th:text="${#numbers.formatDecimal(revenue,1,'COMMA',0,'POINT')}">0</span></div>
                                <div class="text-muted small">Revenue</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Edit Form -->
                <div class="col-lg-8">
                    <div class="table-card p-4">
                        <h5 class="fw-bold mb-4">Edit Profile</h5>
                        <form th:action="@{/organizer/profile/update}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-600">First Name</label>
                                    <input type="text" name="firstName" class="form-control"
                                           th:value="${organizer != null ? organizer.firstName : ''}" required/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-600">Last Name</label>
                                    <input type="text" name="lastName" class="form-control"
                                           th:value="${organizer != null ? organizer.lastName : ''}" required/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-600">Email</label>
                                    <input type="email" class="form-control"
                                           th:value="${organizer != null ? organizer.email : ''}" disabled/>
                                    <div class="form-text">Email cannot be changed</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-600">Phone</label>
                                    <input type="text" name="phone" class="form-control"
                                           th:value="${organizer != null ? organizer.phone : ''}"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-600">City</label>
                                    <input type="text" name="city" class="form-control"
                                           th:value="${organizer != null ? organizer.city : ''}"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-600">Organisation Name</label>
                                    <input type="text" name="organizationName" class="form-control"
                                           th:value="${organizer != null ? organizer.organizationName : ''}"/>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-600">Bio / About</label>
                                    <textarea name="bio" class="form-control" rows="3"
                                              placeholder="Tell attendees about your organisation..."
                                              th:text="${organizer != null ? organizer.bio : ''}"></textarea>
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="submit" class="btn btn-primary-custom">
                                    <i class="bi bi-check-lg me-2"></i>Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click',function(){
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
</script>
</body>
</html>
