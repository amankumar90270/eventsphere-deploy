<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Analytics - EventSphere Organiser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{organizer/organizerheader :: organizerheader}"></div>
    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-actions ms-auto">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${organizer != null ? organizer.initials : 'OR'}">OR</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${organizer != null ? organizer.fullName : 'Organiser'}">Organiser</div>
                        <small class="text-muted">Event Organiser</small>
                    </div>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">Analytics</h2>
                <p class="text-muted">Performance overview for your events</p>
            </div>

            <!-- Summary KPIs -->
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="table-card p-4 text-center" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white">
                        <i class="bi bi-currency-rupee fs-1 mb-2 d-block"></i>
                        <div class="fs-2 fw-bold">₹<span th:text="${#numbers.formatDecimal(revenue,1,'COMMA',0,'POINT')}">0</span></div>
                        <div class="opacity-75">Total Revenue Earned</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="table-card p-4 text-center">
                        <i class="bi bi-calendar-event fs-1 text-primary mb-2 d-block"></i>
                        <div class="fs-2 fw-bold" th:text="${eventCount}">0</div>
                        <div class="text-muted">Events Created</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="table-card p-4 text-center">
                        <i class="bi bi-people fs-1 text-success mb-2 d-block"></i>
                        <div class="fs-2 fw-bold">
                        <span th:text="${totalBookedSeats}">0</span></div>
                        <div class="text-muted">Total Seats Booked</div>
                    </div>
                </div>
            </div>

            <!-- Per-Event breakdown -->
            <div class="table-card p-0">
                <div class="p-3 border-bottom">
                    <h5 class="fw-bold mb-0">Event Performance</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-4">Event</th>
                            <th>Status</th>
                            <th>Capacity</th>
                            <th>Booked</th>
                            <th>Available</th>
                            <th>Occupancy</th>
                            <th>Price</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(events)}">
                            <td colspan="7" class="text-center py-4 text-muted">No events yet.</td>
                        </tr>
                        <tr th:each="ev : ${events}">
                            <td class="ps-4">
                                <div class="fw-600" th:text="${ev.title}">Title</div>
                                <small class="text-muted" th:text="${ev.startDate}">Date</small>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${ev.status.name()=='APPROVED'}?'bg-success':(${ev.status.name()=='PENDING'}?'bg-warning text-dark':(${ev.status.name()=='LIVE'}?'bg-primary':'bg-secondary'))"
                                      th:text="${ev.status}">STATUS</span>
                            </td>
                            <td th:text="${ev.totalCapacity}">0</td>
                            <td class="text-danger fw-600" th:text="${ev.bookedSeats}">0</td>
                            <td class="text-success fw-600" th:text="${ev.availableSeats}">0</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="progress flex-grow-1" style="height:6px;width:80px;">
                                        <div class="progress-bar bg-primary"
                                             th:style="'width:' + ${ev.occupancyPercent} + '%'"></div>
                                    </div>
                                    <small th:text="${#numbers.formatDecimal(ev.occupancyPercent,1,0)} + '%'">0%</small>
                                </div>
                            </td>
                            <td th:text="${ev.formattedPrice}">—</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click',function(){
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
</script>
</body>
</html>
