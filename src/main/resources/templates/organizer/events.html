<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Events - EventSphere Organiser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{organizer/organizerheader :: organizerheader}"></div>

    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-search">
                <i class="bi bi-search position-absolute ms-3 mt-2"></i>
                <input type="text" id="searchInput" placeholder="Search events..." onkeyup="filterTable()">
            </div>
            <div class="navbar-actions ms-auto">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${organizer != null ? organizer.initials : 'OR'}">OR</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${organizer != null ? organizer.fullName : 'Organiser'}">Organiser</div>
                        <small class="text-muted">Organiser</small>
                    </div>
                </div>
            </div>
        </nav>

        <div class="p-4">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">My Events</h2>
                    <p class="text-muted mb-0">Manage your events</p>
                </div>
                <a th:href="@{/organizer/createevent}" class="btn btn-primary-custom">
                    <i class="bi bi-plus-lg me-2"></i>Create New Event
                </a>
            </div>

            <!-- Status filter -->
            <div class="d-flex gap-2 mb-3 flex-wrap">
                <button class="btn btn-sm btn-primary" onclick="filterStatus('ALL')">All</button>
                <button class="btn btn-sm btn-outline-warning" onclick="filterStatus('PENDING')">Pending Approval</button>
                <button class="btn btn-sm btn-outline-success" onclick="filterStatus('APPROVED')">Approved</button>
                <button class="btn btn-sm btn-outline-info" onclick="filterStatus('LIVE')">Live</button>
                <button class="btn btn-sm btn-outline-danger" onclick="filterStatus('REJECTED')">Rejected</button>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(events)}" class="text-center py-5">
                <i class="bi bi-calendar-plus fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">No events yet</h5>
                <p class="text-muted small">Create your first event and submit it for approval.</p>
                <a th:href="@{/organizer/createevent}" class="btn btn-primary-custom mt-2">
                    <i class="bi bi-plus-lg me-2"></i>Create Event
                </a>
            </div>

            <!-- Events Table -->
            <div class="table-card p-0" th:if="${!#lists.isEmpty(events)}">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="eventsTable">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Event</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>City</th>
                            <th>Price</th>
                            <th>Seats</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="ev, i : ${events}" th:data-status="${ev.status}">
                            <td class="ps-4 text-muted" th:text="${i.count}"></td>
                            <td>
                                <div class="fw-600" th:text="${ev.title}">Title</div>
                                <small class="text-muted" th:text="${ev.venue}">Venue</small>
                            </td>
                            <td>
                                <span class="badge bg-secondary" th:if="${ev.category != null}" th:text="${ev.category.name}">—</span>
                                <span class="text-muted small" th:unless="${ev.category != null}">—</span>
                            </td>
                            <td class="small" th:text="${ev.startDate}">—</td>
                            <td class="small" th:text="${ev.city}">—</td>
                            <td class="fw-600" th:text="${ev.formattedPrice}">—</td>
                            <td>
                                <div class="small" th:text="${ev.availableSeats + '/' + ev.totalCapacity}">0/0</div>
                                <div class="progress mt-1" style="height:4px;width:80px;">
                                    <div class="progress-bar bg-success"
                                         th:style="'width:' + ${ev.occupancyPercent} + '%'"></div>
                                </div>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${ev.status.name() == 'APPROVED'} ? 'bg-success' :
                                                      (${ev.status.name() == 'LIVE'} ? 'bg-primary' :
                                                      (${ev.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                      (${ev.status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-secondary')))"
                                      th:text="${ev.status}">STATUS</span>
                                <div th:if="${ev.rejectionReason != null}" class="text-danger small mt-1"
                                     th:text="'Reason: ' + ${ev.rejectionReason}"></div>
                            </td>
                            <td>
                                <form th:action="@{/organizer/events/delete/{id}(id=${ev.id})}" method="post"
                                      onsubmit="return confirm('Delete this event? All bookings will be affected.')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
    function filterStatus(status) {
        document.querySelectorAll('#eventsTable tbody tr[data-status]').forEach(tr => {
            tr.style.display = (status === 'ALL' || tr.dataset.status === status) ? '' : 'none';
        });
    }
    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#eventsTable tbody tr[data-status]').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }
</script>
</body>
</html>
