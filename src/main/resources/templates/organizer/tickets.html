<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tickets - EventSphere Organiser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>
</head>
<body>
<div class="dashboard-wrapper">
    <div th:replace="~{organizer/organizerheader :: organizerheader}"></div>
    <main class="main-content" id="mainContent">
        <nav class="dashboard-navbar">
            <button class="navbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <div class="navbar-actions ms-auto">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${organizer != null ? organizer.initials : 'OR'}">OR</div>
                    <div class="d-none d-md-block">
                        <div class="fw-600" th:text="${organizer != null ? organizer.fullName : 'Organiser'}">Organiser</div>
                        <small class="text-muted">Event Organiser</small>
                    </div>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">Ticket Types</h2>
                <p class="text-muted">Ticket configurations for your events</p>
            </div>

            <!-- Events and their tickets -->
            <div th:if="${#lists.isEmpty(events)}" class="text-center py-5">
                <i class="bi bi-ticket-perforated fs-1 text-muted d-block mb-3"></i>
                <h5 class="text-muted">No events yet</h5>
                <a th:href="@{/organizer/createevent}" class="btn btn-primary-custom mt-2">Create Event</a>
            </div>

            <div th:each="ev : ${events}" class="table-card p-4 mb-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h5 class="fw-bold mb-1" th:text="${ev.title}">Event</h5>
                        <div class="text-muted small">
                            <i class="bi bi-calendar3 me-1"></i><span th:text="${ev.startDate}">Date</span>
                            &nbsp;|&nbsp;<i class="bi bi-geo-alt me-1"></i><span th:text="${ev.city}">City</span>
                            &nbsp;|&nbsp;
                            <span class="badge" th:classappend="${ev.status.name()=='APPROVED'}?'bg-success':(${ev.status.name()=='PENDING'}?'bg-warning text-dark':'bg-secondary')"
                                  th:text="${ev.status}">STATUS</span>
                        </div>
                    </div>
                </div>
                <div class="row g-3">
                    <!-- Default ticket (from event price) -->
                    <div class="col-md-4">
                        <div class="border rounded p-3">
                            <div class="fw-600">Standard Ticket</div>
                            <div class="text-primary fw-bold fs-5 mt-1" th:text="${ev.formattedPrice}">Price</div>
                            <div class="text-muted small mt-1">
                                <i class="bi bi-people me-1"></i>
                                <span th:text="${ev.availableSeats}">0</span> / <span th:text="${ev.totalCapacity}">0</span> available
                            </div>
                            <div class="progress mt-2" style="height:4px;">
                                <div class="progress-bar bg-primary" th:style="'width:' + ${ev.occupancyPercent} + '%'"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click',function(){
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('mainContent').classList.toggle('expanded');
    });
</script>
</body>
</html>
