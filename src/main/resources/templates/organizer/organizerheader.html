<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Organizer Header</title>
</head>
<body>
<div th:fragment="organizerheader">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <i class="bi bi-calendar-event"></i> Organizer Panel
            </div>
        </div>

        <nav class="sidebar-menu">
            <a th:href="@{/organizer/dashboard}" class="sidebar-menu-item">
                <i class="bi bi-house-door"></i><span>Dashboard</span>
            </a>

            <a th:href="@{/organizer/events}" class="sidebar-menu-item">
                <i class="bi bi-calendar3"></i><span>My Events</span>
            </a>

            <a th:href="@{/organizer/createevent}" class="sidebar-menu-item">
                <i class="bi bi-plus-circle"></i><span>Create Event</span>
            </a>

            <a th:href="@{/organizer/tickets}" class="sidebar-menu-item">
                <i class="bi bi-ticket-perforated"></i><span>Ticket Management</span>
            </a>

            <a th:href="@{/organizer/bookings}" class="sidebar-menu-item">
                <i class="bi bi-cart-check"></i><span>Bookings</span>
            </a>

            <a th:href="@{/organizer/checkin}" class="sidebar-menu-item">
                <i class="bi bi-qr-code-scan"></i><span>Check-In</span>
            </a>

<!--            <a th:href="@{/organizer/communication}" class="sidebar-menu-item">-->
<!--                <i class="bi bi-envelope"></i><span>Communications</span>-->
<!--            </a>-->

            <a th:href="@{/organizer/analytics}" class="sidebar-menu-item">
                <i class="bi bi-graph-up"></i><span>Analytics</span>
            </a>

            <a th:href="@{/organizer/profile}" class="sidebar-menu-item">
                <i class="bi bi-person-circle"></i><span>Profile</span>
            </a>

            <form th:action="@{/logout}" method="post" style="display:inline;width:100%">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit"
                        class="sidebar-menu-item w-100 text-danger"
                        style="background:none;border:none;cursor:pointer;text-align:left;padding:0.5rem 1rem">
                    <i class="bi bi-box-arrow-left"></i><span>Logout</span>
                </button>
            </form>
        </nav>
    </aside>
</div>
</body>
</html>
