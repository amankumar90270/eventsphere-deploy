<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EventSphere</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            max-width: 450px;
            margin: 2rem auto;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 3rem;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo i {
            font-size: 50px;
            color: #1a73e8;
        }

        .brand-logo h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #333;
            margin-top: 1rem;
        }

        .brand-logo p {
            color: #666;
            font-size: 14px;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 0 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.1);
        }

        .input-group-text {
            border: 2px solid #e0e0e0;
            border-right: none;
            background: white;
            border-radius: 10px 0 0 10px;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .btn-login {
            height: 50px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            background: #1a73e8;
            border: none;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #0d47a1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 115, 232, 0.3);
        }

        .social-login {
            margin-top: 2rem;
        }

        .social-btn {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: #1a73e8;
            background: #f8f9fa;
        }

        .social-btn i {
            margin-right: 10px;
            font-size: 20px;
        }

        .google-btn {
            color: #DB4437;
        }

        .facebook-btn {
            color: #4267B2;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #999;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 1rem;
            font-size: 14px;
        }

        .form-check-input:checked {
            background-color: #1a73e8;
            border-color: #1a73e8;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-home a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-home a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<!-- Back to Home -->
<div class="back-home">
    <a th:href="@{/public/index}"><i class="bi bi-arrow-left me-2"></i>Back to Home</a>

</div>

<div class="container">
    <div class="login-container">
        <div class="login-card">
            <!-- Brand Logo -->
            <div class="brand-logo">
                <i class="bi bi-calendar-event"></i>
                <h2>EventSphere</h2>
                <p>Welcome back! Please login to your account</p>
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post" autocomplete="off">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="you@eventsphere.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div th:if="${errorMsg}" class="alert alert-danger py-2 mb-3" th:text="${errorMsg}">Error</div>
                    <div th:if="${logoutMsg}" class="alert alert-success py-2 mb-3" th:text="${logoutMsg}">Logged out</div>
                    <div th:if="${regSuccess}" class="alert alert-success py-2 mb-3" th:text="${regSuccess}">Success</div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-600">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                    </button>
                </form>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Social Login -->
<!--            <div class="social-login">-->
<!--                <button class="social-btn google-btn w-100 mb-3">-->
<!--                    <i class="bi bi-google"></i>-->
<!--                    Continue with Google-->
<!--                </button>-->
<!--                <button class="social-btn facebook-btn w-100">-->
<!--                    <i class="bi bi-facebook"></i>-->
<!--                    Continue with Facebook-->
<!--                </button>-->
<!--            </div>-->

            <!-- Sign Up Link -->
            <div class="text-center mt-4">
                <p class="text-muted mb-0">Don't have an account? <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
            </div>
        </div>

        <!-- Role Selection -->
        <div class="text-center mt-3">
            <p class="text-white">Are you an event organizer? <a th:href="@{/login}" class="text-white fw-bold">Login as Organizer</a></p>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Toggle password visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    }

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // Add your login logic here
        alert('Login functionality would be implemented here!');
        window.location.href = '../user/user-dashboard.html';
    });
</script>
</body>
</html>
