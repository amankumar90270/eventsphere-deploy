<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EventSphere</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
            font-family: 'Inter', sans-serif;
        }

        .register-container {
            max-width: 550px;
            margin: 0 auto;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 3rem;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo i {
            font-size: 50px;
            color: #1a73e8;
        }

        .brand-logo h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: #333;
            margin-top: 1rem;
        }

        .brand-logo p {
            color: #666;
            font-size: 14px;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 0 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.1);
        }

        .input-group-text {
            border: 2px solid #e0e0e0;
            border-right: none;
            background: white;
            border-radius: 10px 0 0 10px;
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .btn-register {
            height: 50px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            background: #1a73e8;
            border: none;
            transition: all 0.3s;
        }

        .btn-register:hover {
            background: #0d47a1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 115, 232, 0.3);
        }

        .password-strength {
            height: 5px;
            border-radius: 3px;
            background: #e0e0e0;
            margin-top: 10px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak { width: 33%; background: #dc3545; }
        .strength-medium { width: 66%; background: #ffc107; }
        .strength-strong { width: 100%; background: #28a745; }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .requirement i {
            margin-right: 8px;
            font-size: 14px;
        }

        .requirement.met {
            color: #28a745;
        }

        .requirement.not-met {
            color: #dc3545;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #999;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 1rem;
            font-size: 14px;
        }

        .social-btn {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: #1a73e8;
            background: #f8f9fa;
        }

        .social-btn i {
            margin-right: 10px;
            font-size: 20px;
        }

        .google-btn { color: #DB4437; }
        .facebook-btn { color: #4267B2; }

        .form-check-input:checked {
            background-color: #1a73e8;
            border-color: #1a73e8;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-home a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-home a:hover {
            opacity: 0.8;
        }

        .form-select {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }

        .form-select:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 0.2rem rgba(26, 115, 232, 0.1);
        }
    </style>
</head>
<body>
<!-- Back to Home -->
<div class="back-home">
    <a th:href="@{/public/index}"><i class="bi bi-arrow-left me-2"></i>Back to Home</a>
</div>

<div class="container">
    <div class="register-container">
        <div class="register-card">
            <!-- Brand Logo -->
            <div class="brand-logo">
                <i class="bi bi-calendar-event"></i>
                <h2>Join EventSphere</h2>
                <p>Create your account and start exploring amazing events</p>
            </div>

            <!-- Registration Form -->
            <div th:if="${regError}" class="alert alert-danger mb-3" th:text="${regError}">Error</div>
            <div th:if="${regSuccess}" class="alert alert-success mb-3" th:text="${regSuccess}">Success</div>
            <form th:action="@{/register}" method="post" id="registerForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                            <input type="text" name="firstName" class="form-control" placeholder="First Name" required/>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <input type="text" name="lastName" class="form-control" placeholder="Last Name" required/>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                        <input type="email" name="email" class="form-control" placeholder="Email address" required/>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-telephone text-muted"></i>
                            </span>
                        <input type="tel" name="phone" class="form-control" placeholder="Phone number"/>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Create password" required/>
                        <span class="input-group-text" style="cursor: pointer; border-left: none; border-radius: 0 10px 10px 0;" onclick="togglePassword()">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </span>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="password-requirements" id="passwordRequirements">
                        <div class="requirement not-met" id="req-length">
                            <i class="bi bi-x-circle"></i>
                            <span>At least 8 characters</span>
                        </div>
                        <div class="requirement not-met" id="req-uppercase">
                            <i class="bi bi-x-circle"></i>
                            <span>One uppercase letter</span>
                        </div>
                        <div class="requirement not-met" id="req-number">
                            <i class="bi bi-x-circle"></i>
                            <span>One number</span>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill text-muted"></i>
                            </span>
                        <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm password" required/>
                    </div>
                </div>

                <div class="mb-3">
                    <select name="role" class="form-select" required>
                        <option value="">Select your role</option>
                        <option value="USER">Event Attendee</option>
                        <option value="ORGANIZER">Event Organizer</option>
                    </select>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label" for="terms">
                            I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a>
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="newsletter">
                        <label class="form-check-label" for="newsletter">
                            Send me event updates and promotional emails
                        </label>
                    </div>
                </div>

                <div th:if="${regError}" class="alert alert-danger py-2 mb-3" th:text="${regError}">Error</div>
<button type="submit" class="btn btn-primary btn-register w-100">
                    Create Account <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Social Login -->
<!--            <div class="social-login">-->
<!--                <button class="social-btn google-btn w-100 mb-3">-->
<!--                    <i class="bi bi-google"></i>-->
<!--                    Sign up with Google-->
<!--                </button>-->
<!--                <button class="social-btn facebook-btn w-100">-->
<!--                    <i class="bi bi-facebook"></i>-->
<!--                    Sign up with Facebook-->
<!--                </button>-->
<!--            </div>-->

            <!-- Login Link -->
            <div class="text-center mt-4">
                <p class="text-muted mb-0">Already have an account? <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Toggle password visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    }

    // Password strength checker
    document.getElementById('password').addEventListener('input', function(e) {
        const password = e.target.value;
        const strengthBar = document.getElementById('strengthBar');

        let strength = 0;
        const requirements = {
            length: password.length >= 8,
            uppercase: /[A-Z]/.test(password),
            number: /[0-9]/.test(password)
        };

        // Update requirements UI
        updateRequirement('req-length', requirements.length);
        updateRequirement('req-uppercase', requirements.uppercase);
        updateRequirement('req-number', requirements.number);

        // Calculate strength
        if (requirements.length) strength++;
        if (requirements.uppercase) strength++;
        if (requirements.number) strength++;

        // Update strength bar
        strengthBar.className = 'password-strength-bar';
        if (strength === 1) strengthBar.classList.add('strength-weak');
        else if (strength === 2) strengthBar.classList.add('strength-medium');
        else if (strength === 3) strengthBar.classList.add('strength-strong');
    });

    function updateRequirement(id, met) {
        const element = document.getElementById(id);
        const icon = element.querySelector('i');

        if (met) {
            element.classList.remove('not-met');
            element.classList.add('met');
            icon.classList.remove('bi-x-circle');
            icon.classList.add('bi-check-circle');
        } else {
            element.classList.remove('met');
            element.classList.add('not-met');
            icon.classList.remove('bi-check-circle');
            icon.classList.add('bi-x-circle');
        }
    }

    // Form submission handled by Spring MVC POST /register
</script>
</body>
</html>
